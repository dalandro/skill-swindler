# Skill Harvest — Watchlist
#
# Seeded patterns the Skill Prompt Reminder should actively watch for.
# Add an entry when you notice a repeat pattern in the wild. Remove entries
# that have graduated to a live skill or that turned out to be one-offs.
#
# Each entry:
#   key:                  short identifier used in candidate frontmatter
#   description:          one-line human-readable description
#   signals:              concrete things to look for in a session
#   seen_by:              engineers known to do this work (seeds, not exhaustive)

patterns:

  feature-configuration-setting:
    description: Add or change a feature configuration setting end-to-end.
    signals:
      - edits to a config/feature-flags file
      - matching edits to a consumer that reads the flag
      - a test or snapshot update covering the new setting
    seen_by: [theo, nadia]

  graphql-field:
    description: Add a GraphQL field — mutation or query + resolver + type.
    signals:
      - edits to a schema/*.graphql or schema.ts file
      - a new resolver function
      - a matching type definition
      - a test exercising the new field
    seen_by: [alex, ravi]

  package-upgrade:
    description: Upgrade a package, update lockfile, run tests, fix fallout.
    signals:
      - package.json / requirements.txt / go.mod edit
      - lockfile regeneration
      - test run
      - follow-up edits to call sites affected by the new version
    seen_by: [marcus]

  database-migration:
    description: Generate a migration and its rollback, apply, verify.
    signals:
      - a new file under migrations/ or db/migrate/
      - both up and down / rollback defined
      - migration applied locally
      - schema snapshot or types regenerated
    seen_by: []

  api-endpoint-scaffold:
    description: Scaffold a new API endpoint — route, handler, validation, test.
    signals:
      - new route registration
      - a handler function
      - input validation or schema
      - a test hitting the endpoint
    seen_by: []

  deployment-env-var:
    description: Add or change a deployment environment variable across envs.
    signals:
      - edits to env templates or secrets manifest
      - matching reference in code
      - updates across more than one environment (dev/staging/prod)
    seen_by: []
